document.addEventListener('DOMContentLoaded', () => {
  setLogos();
  google.script.run.withSuccessHandler(handleInitial).withFailureHandler(showError).getInitialData();
});

function setLogos(){
  if(APP.logoLeftUrl) document.querySelector('#leftLogo img').src = APP.logoLeftUrl;
  if(APP.logoRightUrl) document.querySelector('#rightLogo img').src = APP.logoRightUrl;
}
function handleInitial(res){ if(!res.ok) return showError(res.error); APP.data=res.data.dashboard; APP.lookups=res.data.lookups; populateLookups(); renderDashboard(APP.data); }
function loginUser(){ showLoading(true); google.script.run.withSuccessHandler(res=>{ showLoading(false); if(!res.ok) return showError(res.error); APP.user=res.data; document.getElementById('loginPanel').classList.add('hidden'); document.getElementById('dashboardPanel').classList.remove('hidden'); document.getElementById('userName').textContent=APP.user.nurseName; document.getElementById('userRole').textContent=APP.user.role; startAutoRefresh(); refreshDashboard(); }).withFailureHandler(showError).login(val('loginUsername'), val('loginPassword')); }
function logout(){ APP.user=null; stopAutoRefresh(); document.getElementById('dashboardPanel').classList.add('hidden'); document.getElementById('loginPanel').classList.remove('hidden'); }
function startAutoRefresh(){ stopAutoRefresh(); APP.refreshTimer=setInterval(refreshDashboard,3000); }
function stopAutoRefresh(){ if(APP.refreshTimer) clearInterval(APP.refreshTimer); }
function debouncedRefresh(){ clearTimeout(APP.debounce); APP.debounce=setTimeout(refreshDashboard,300); }
function refreshDashboard(){ google.script.run.withSuccessHandler(res=>{ if(!res.ok) return showError(res.error); APP.data=res.data; renderDashboard(APP.data); }).withFailureHandler(showError).getDashboardData(getFilters()); }
function getFilters(){ return { search:val('searchInput'), area:val('areaFilter'), status:val('statusFilter'), nurse:val('nurseFilter') }; }
function populateLookups(){
  fillSelect('areaFilter', APP.lookups.Areas, 'All areas'); fillSelect('admitArea', APP.lookups.Areas, 'Select area');
  fillSelect('movementType', APP.lookups.MovementTypes, 'Select movement'); fillSelect('dischargeType', APP.lookups.DischargeTypes, 'Select discharge'); fillSelect('finalOutcome', APP.lookups.FinalOutcomes, 'Select outcome');
  const nurses = [...new Set((APP.users||[]).map(u=>u.nurseName).filter(Boolean))];
  const users = APP.data ? [] : [];
  google.script.run.withSuccessHandler(()=>{});
  const dl=document.getElementById('nurseList'); dl.innerHTML='';
  (APP.lookups.Nurses||[]).forEach(n=>{});
}
function updateNurseFilter(){ const names=[...new Set(APP.data.beds.map(b=>b.CurrentNurse).filter(Boolean))]; fillSelect('nurseFilter', names, 'All nurses'); const dl=document.getElementById('nurseList'); dl.innerHTML=names.map(n=>`<option value="${esc(n)}"></option>`).join(''); }
function renderDashboard(data){ renderSummary(data.summary); renderCharts(data.charts); updateNurseFilter(); renderBeds(data.beds); filterAdmitBeds(); document.getElementById('lastUpdated').textContent='Last updated: '+fmt(data.serverTime); }
function renderSummary(s){ const items=[['Total beds',s.totalBeds],['Occupied',s.occupiedBeds],['Vacant',s.vacantBeds],['Ward occupancy',s.wardOccupancy],['Heat Stroke occupancy',s.heatStrokeOccupancy],['Average LOS',s.averageLengthOfStay],['Admissions today',s.admissionsToday],['Discharges today',s.dischargesToday]]; document.getElementById('summaryCards').innerHTML=items.map(i=>`<div class="metric"><div class="label">${i[0]}</div><div class="value">${i[1]}</div></div>`).join(''); }
function renderCharts(charts){ renderBar('categoryChart', charts.category, true); renderBar('statusChart', charts.status, false); }
function renderBar(id, rows, hasTotal){ document.getElementById(id).innerHTML=rows.map(r=>{ const pct=hasTotal&&r.total?Math.round(r.value/r.total*100):(rows.reduce((a,b)=>a+b.value,0)?Math.round(r.value/rows.reduce((a,b)=>a+b.value,0)*100):0); return `<div class="bar-row"><strong>${esc(r.label)}</strong><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><span>${r.value}${hasTotal?'/'+r.total:''}</span></div>`; }).join(''); }
function renderBeds(beds){ const byArea={}; beds.forEach(b=>{ (byArea[b.Area]=byArea[b.Area]||[]).push(b); }); document.getElementById('bedGrid').innerHTML=Object.keys(byArea).map(area=>`<div class="area-group">${esc(area)}</div>`+byArea[area].map(b=>`<article class="bed-card ${b.Status.toLowerCase()}"><h3>${esc(b.DisplayBedName)}</h3><span class="pill">${esc(b.Status)}</span><div class="bed-meta"><strong>BedID:</strong> ${esc(b.BedID)}<br><strong>Category:</strong> ${esc(b.Category)}<br>${b.Status==='Occupied'?`<strong>MRN:</strong> ${esc(b.CurrentMRN)}<br><strong>Nurse:</strong> ${esc(b.CurrentNurse)}<br><strong>Admitted:</strong> ${fmt(b.AdmissionDateTime)}<br><strong>LOS:</strong> ${esc(b.DurationText)}`:'Ready for admission'}</div></article>`).join('')).join(''); }
function filterAdmitBeds(){ if(!APP.data) return; const area=val('admitArea'); const vacant=APP.data.beds.filter(b=>b.Status==='Vacant' && (!area || b.Area===area)); fillSelect('admitBed', vacant.map(b=>({value:b.BedID,label:`${b.DisplayBedName} — ${b.Area}`})), 'Select vacant bed'); fillSelect('toBed', APP.data.beds.filter(b=>b.Status==='Vacant').map(b=>({value:b.BedID,label:`${b.DisplayBedName} — ${b.Area}`})), 'Select target bed'); }
function submitAdmission(e){ e.preventDefault(); if(!APP.user) return showError('Login is required.'); const p={mrn:val('admitMrn'),bedId:val('admitBed'),assignedNurse:val('admitNurse'),notes:val('admitNotes'),createdBy:APP.user.username,role:APP.user.role}; runAction('admitPatient',p,'Admission saved.'); }
function submitTransfer(e){ e.preventDefault(); if(!confirm('Confirm patient movement/transfer?')) return; const p={mrn:val('moveMrn'),movementType:val('movementType'),toBedId:val('toBed'),destination:val('moveDestination'),notes:val('moveNotes'),createdBy:APP.user.username,role:APP.user.role}; runAction('transferPatient',p,'Movement saved.'); }
function submitDischarge(e){ e.preventDefault(); if(!confirm('Confirm discharge? Bed will become vacant immediately.')) return; const p={mrn:val('dischargeMrn'),dischargeType:val('dischargeType'),dischargeDestination:val('dischargeDestination'),finalOutcome:val('finalOutcome'),notes:val('dischargeNotes'),createdBy:APP.user.username,role:APP.user.role}; runAction('dischargePatient',p,'Discharge saved.'); }
function runAction(fn,p,msg){ showLoading(true); google.script.run.withSuccessHandler(res=>{ showLoading(false); if(!res.ok) return showError(res.error); toast(res.data.message||msg); APP.data=res.data.dashboard; renderDashboard(APP.data); }).withFailureHandler(showError)[fn](p); }
function searchJourney(){ const mrn=val('historyMrn'); if(!mrn) return showError('MRN is required.'); google.script.run.withSuccessHandler(res=>{ if(!res.ok) return showError(res.error); renderTable('journeyResult', res.data.timeline); }).withFailureHandler(showError).searchPatientJourney(mrn); }
function downloadCsvReport(type){ const params={type, filters:getFilters(), mrn:val('historyMrn'), startDate:val('reportStart'), endDate:val('reportEnd')}; google.script.run.withSuccessHandler(res=>{ if(!res.ok) return showError(res.error); downloadCsv(res.data.rows, `${type}_report_${new Date().toISOString().slice(0,10)}.csv`); }).withFailureHandler(showError).getReportData(params); }
function openPrintReport(){ window.print(); }
function renderTable(id, rows){ if(!rows||!rows.length){ document.getElementById(id).innerHTML='<p class="hint">No records found.</p>'; return; } const heads=Object.keys(rows[0]); document.getElementById(id).innerHTML=`<table class="table"><thead><tr>${heads.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${heads.map(h=>`<td>${esc(r[h])}</td>`).join('')}</tr>`).join('')}</tbody></table>`; }
function downloadCsv(rows, filename){ if(!rows||!rows.length) return showError('No data to export.'); const heads=Object.keys(rows[0]); const csv=[heads.join(',')].concat(rows.map(r=>heads.map(h=>`"${String(r[h]??'').replace(/"/g,'""')}"`).join(','))).join('\n'); const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click(); URL.revokeObjectURL(a.href); }
function fillSelect(id, values, placeholder){ const el=document.getElementById(id); if(!el) return; const current=el.value; el.innerHTML=`<option value="">${placeholder}</option>`+(values||[]).map(v=>typeof v==='object'?`<option value="${esc(v.value)}">${esc(v.label)}</option>`:`<option>${esc(v)}</option>`).join(''); if([...el.options].some(o=>o.value===current)) el.value=current; }
function toggleTransferBed(){ document.getElementById('toBed').disabled = val('movementType') !== 'Transfer to another bed'; }
function val(id){ return (document.getElementById(id)?.value||'').trim(); }
function esc(x){ return String(x??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
function fmt(x){ if(!x) return ''; try{return new Date(x).toLocaleString('en-GB',{hour12:false});}catch(e){return x;} }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
function showError(err){ showLoading(false); toast(typeof err==='string'?err:(err.message||'Unexpected error')); }
function showLoading(show){ document.getElementById('loading').classList.toggle('hidden',!show); }
</script>
