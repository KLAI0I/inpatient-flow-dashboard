<style>
:root{--bg:#f4f7fb;--card:#fff;--ink:#172033;--muted:#697386;--line:#e3e8ef;--primary:#1769aa;--success:#dff8e6;--danger:#ffe2e2;--danger-ink:#9d1c1c;--warn:#fff2cc;--shadow:0 10px 30px rgba(18,38,63,.08);--sidebar:320px;--header-h:86px}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--ink)}main{width:100%;max-width:none;margin:0;padding:14px 16px 18px}.hidden{display:none!important}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:16px}.hint{color:var(--muted);font-size:13px}
.app-header{height:var(--header-h);display:flex;align-items:center;justify-content:space-between;gap:20px;padding:10px 28px;background:linear-gradient(135deg,#0f4c81,#1680b8);color:white;position:sticky;top:0;z-index:30}.brand-logo{height:66px;display:flex;align-items:center;justify-content:center}.brand-logo img{display:block;max-height:64px;max-width:260px;object-fit:contain}.left-logo{justify-content:flex-start}.right-logo{justify-content:flex-end}.header-title{flex:1;text-align:center;font-size:34px;font-weight:900;letter-spacing:.5px;color:#fff}
footer{text-align:center;padding:18px;color:#475569;font-weight:700}.login-panel{max-width:650px;margin:60px auto}.dashboard-shell{display:grid;grid-template-columns:var(--sidebar) minmax(0,1fr);gap:16px;align-items:start}.dashboard-content{min-width:0;width:100%}.sidebar{position:sticky;top:calc(var(--header-h) + 14px);height:calc(100vh - var(--header-h) - 28px);padding:0;z-index:20}.sidebar-scroll{height:100%;overflow:auto;padding:16px}.sidebar-block{display:grid;gap:10px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}.sidebar-block h3{margin:0 0 2px;font-size:16px;color:#0f4c81}.sidebar label,.form-grid label{display:flex;flex-direction:column;gap:6px;font-size:13px;color:#475569;font-weight:700}.sidebar button{width:100%}.logout-btn{margin-top:16px}.user-chip{display:flex;flex-direction:column;background:#eef6ff;border-radius:12px;padding:10px 12px;gap:3px}input,select,textarea,button{width:100%;font:inherit;border-radius:12px;border:1px solid #cbd5e1;padding:10px;background:white}textarea{min-height:64px;resize:vertical}button{cursor:pointer;font-weight:800;border:0;background:#e2e8f0}button.primary{background:var(--primary);color:white}button.secondary{background:#475569;color:white}button.warning{background:#d97706;color:white}button.danger{background:#b91c1c;color:white}

</style>
